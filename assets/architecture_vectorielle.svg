<text x="76" y="1497" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="500" fill="#1f2937">Inconnu / non documenté publiquement</text>
<rect x="600" y="1478" width="26" height="26" rx="5" ry="5" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
<text x="636" y="1497" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="500" fill="#1f2937">Connu / documenté, ou équivalent open source clair</text>
<rect x="1120" y="1478" width="26" height="26" rx="5" ry="5" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
<text x="1156" y="1497" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="500" fill="#1f2937">Optionnel / différence d'architecture entre les deux stacks</text>
<text x="810.0" y="1532" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-style="italic" fill="#64748b">Salesforce : 3 modèles en jeu (embedding + Atlas + LLM final) — il ne reste qu'un seul inconnu : le LLM interne d'Atlas</text>
<text x="810.0" y="1568.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#0f172a">
<tspan x="810.0" dy="0">REQUÊTAGE : SQL PROPRIÉTAIRE  vs  LANGAGE NATUREL / SQL OUVERT</tspan>
</text>
<rect x="210" y="1590" width="560" height="224" rx="10" ry="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
<text x="228" y="1612" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#93c5fd">Salesforce Query API — SQL propriétaire</text>
<text x="228" y="1638" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">SELECT chunk.Chunk__c, idx.score__c</text>
<text x="228" y="1655" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">FROM vector_search(</text>
<text x="228" y="1672" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">    TABLE(mon_index__dlm),</text>
<text x="228" y="1689" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">    'ma question en langage naturel',</text>
<text x="228" y="1706" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">    '',     -- filtre pré-recherche (vide ici)</text>
<text x="228" y="1723" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">    5        -- top-K résultats</text>
<text x="228" y="1740" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">) idx</text>
<text x="228" y="1757" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">JOIN mon_chunk__dlm chunk</text>
<text x="228" y="1774" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">  ON idx.RecordId__c = chunk.RecordId__c</text>
<text x="228" y="1791" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">ORDER BY idx.score__c DESC</text>
<rect x="830" y="1590" width="560" height="241" rx="10" ry="10" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
<text x="848" y="1612" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="700" fill="#86efac">Stack locale — langage naturel OU SQL ouvert</text>
<text x="848" y="1638" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#7dd3fc" font-style="italic"># Option A — langage naturel (Python)</text>
<text x="848" y="1655" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">results = collection.query(</text>
<text x="848" y="1672" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">    query_texts=["ma question en langage naturel"],</text>
<text x="848" y="1689" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">    n_results=5</text>
<text x="848" y="1706" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">)</text>
<text x="848" y="1723" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0"></text>
<text x="848" y="1740" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#7dd3fc" font-style="italic">-- Option B — SQL ouvert (pgvector)</text>
<text x="848" y="1757" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">SELECT content,</text>
<text x="848" y="1774" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">       embedding &lt;-&gt; '[0.12, 0.07, ...]' AS distance</text>
<text x="848" y="1791" xml:space="preserve" font-family="Consolas, 'Courier New', monospace" font-size="12.3" fill="#e2e8f0">FROM chunks</text>
